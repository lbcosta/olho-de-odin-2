  "/shop-search/trading (4)":
    post:
      tags: ["Mercado"]
      summary: Histórico de Preço do Item sendo vendido
      description: Após buscar pelo item, é possível o jogador ver o histórico de preço do item que está sendo vendido. Retorna no formato Next.js RSC.
      parameters:
        - name: storeType
          in: query
          required: true
          schema:
            type: string
            enum: [BUY, SELL]
          example: BUY
          description: Tipo de loja (ex. BUY para comprar, SELL para vender)
        - name: serverType
          in: query
          required: true
          schema:
            type: string
            enum: [FREYA, NIDHOGG]
          example: NIDHOGG
          description: Servidor do jogo
        - name: searchWord
          in: query
          required: true
          schema:
            type: string
          example: elixir vermelho
          description: Nome do item a ser buscado no mercado
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/PriceHistoryRequest"
            example:
              - type: "price"
                params:
                  itemId: 1100003
                  svrId: 303
                  page: 1
                  limit: 10
                  period: "$undefined"
