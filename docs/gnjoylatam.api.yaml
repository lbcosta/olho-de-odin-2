  "/shop-search/trading (2)":
    post:
      tags: ["Mercado"]
      summary: Detalhes da Loja que vende o item
      description: Retorna informações detalhadas de uma determinada loja que vende o item (ex. coordenadas x/y no mapa). Retorna no formato Next.js RSC.
      parameters:
        - name: storeType
          in: query
          required: true
          schema:
            type: string
            enum: [BUY, SELL]
          example: BUY
          description: Tipo de loja (ex. BUY para comprar, SELL para vender)
        - name: serverType
          in: query
          required: true
          schema:
            type: string
            enum: [FREYA, NIDHOGG]
          example: NIDHOGG
          description: Servidor do jogo
        - name: searchWord
          in: query
          required: true
          schema:
            type: string
          example: elixir vermelho
          description: Nome do item a ser buscado no mercado
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/StoreInfoRequest"
      responses:
        200:
          description: Sucesso ao retornar o payload estruturado em formato Next.js (RSC - React Server Components). <br> - A resposta HTTP real desta rota SEMPRE será uma string no formato RSC, conforme exemplificado no text/plain abaixo. <br> - O Media type application/json NÃO é retornado diretamente pela API. Ele está documentado aqui APENAS para mostrar o esquema lógico do resultado pós-parsing (os dados finais que você vai extrair de dentro da string RSC).
