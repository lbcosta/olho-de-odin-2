            text/plain:
              schema:
                type: string
              example: |
                0:{"a":"$@1","f":"","b":"-EBlZAYMwEznljqiAN2bB"}
                1:{"data":{"svrId":303,"svrName":"NIDHOGG","itemId":1100003,"mapId":835,"ssi":"7650148185167452340","storeName":"Consumiveis/Elixir/Hp/Etc","mapName":"prt_mk.gat","itemSellerCharName":"Da.Turca.","itemFullName":"Elixir Vermelho","itemPrice":1400,"marketStoreTypeCode":"BUY","itemCnt":6000,"databaseImgPath":"https://assets.gnjoylatam.com/static/upload/database/item/2025/10/1100003.png","databaseType":"consumable","xpos":"166","ypos":"146"},"success":true}
            application/json:
              schema:
                $ref: "#/components/schemas/StoreInfoPayload"
  "/shop-search/trading (3)":
    post:
      tags: ["Mercado"]
      summary: Detalhes do Item sendo vendido
      description: Após buscar pelo item, retorna as informações do item que está sendo vendido na loja. Retorna no formato Next.js RSC.
      parameters:
        - name: storeType
          in: query
          required: true
          schema:
            type: string
            enum: [BUY, SELL]
          example: BUY
          description: Tipo de loja (ex. BUY para comprar, SELL para vender)
        - name: serverType
          in: query
          required: true
          schema:
            type: string
            enum: [FREYA, NIDHOGG]
          example: NIDHOGG
          description: Servidor do jogo
        - name: searchWord
          in: query
          required: true
          schema:
            type: string
          example: elixir vermelho
          description: Nome do item a ser buscado no mercado
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/ItemInfoRequest"
            example:
              - type: "item"
                params:
                  svrId: 303
                  mapId: 835
                  ssi: "7650148185167452340"
                  multiLan: "en-US"
      responses:
        200:
          description: Sucesso ao retornar o payload estruturado em formato Next.js (RSC - React Server Components). <br> - A resposta HTTP real desta rota SEMPRE será uma string no formato RSC, conforme exemplificado no text/plain abaixo. <br> - O Media type application/json NÃO é retornado diretamente pela API. Ele está documentado aqui APENAS para mostrar o esquema lógico do resultado pós-parsing (os dados finais que você vai extrair de dentro da string RSC).
          content:
            text/plain:
              schema:
                type: string
              example: |
                0:{"a":"$@1","f":"","b":"-EBlZAYMwEznljqiAN2bB"}
                1:{"data":{"svrId":303,"itemId":1100003,"itemName":"Elixir Vermelho","itemPrice":1400,"mapId":835,"ssi":"7650148185167452340","itemType":null,"itemOptionProperty":null,"randomOpt1":null,"randomOpt2":null,"randomOpt3":null,"randomOpt4":null,"slot1":null,"slot2":null,"slot3":null,"slot4":null,"hasDatabaseItem":true,"databaseImgPath":"https://assets.gnjoylatam.com/static/upload/database/item/2025/10/1100003.png","databaseType":"consumable"},"success":true}
